<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; frame-ancestors 'none';"/>
<meta http-equiv="X-Content-Type-Options" content="nosniff"/>
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
<title>E-Hospitee - Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="ehospitee.css"/>
<style>
/* ── Loading state ── */
.form-btn { display: flex; align-items: center; justify-content: center; gap: 8px; }
.form-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none !important; }
.btn-spinner { display: none; width: 17px; height: 17px; border: 2.5px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.65s linear infinite; flex-shrink: 0; }
.form-btn.loading .btn-spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Field errors ── */
.form-control.error { border-color: #EF4444 !important; background: #FFF5F5; }
.form-control.error:focus { box-shadow: 0 0 0 3px rgba(239,68,68,.12) !important; }
.field-error { font-size: .74rem; color: #EF4444; margin-top: 5px; display: none; font-weight: 500; }
.field-error.show { display: block; }

/* ── Password toggle ── */
.pw-wrap { position: relative; }
.pw-wrap .form-control { padding-right: 46px; }
.pw-toggle {
  position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--ink-light);
  font-size: .82rem; padding: 4px 2px; line-height: 1; transition: color .2s;
}
.pw-toggle:hover { color: var(--teal); }

/* ── Auth page layout ── */
.auth-wrap {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 88px 20px 48px;
  background: linear-gradient(145deg, #f0fdfa 0%, #ffffff 45%, #f0fdfa 100%);
  position: relative; overflow: hidden;
}
.auth-wrap::before {
  content: ''; position: absolute;
  top: -180px; right: -180px;
  width: 520px; height: 520px; border-radius: 50%;
  background: radial-gradient(circle, rgba(11,122,117,.09), transparent 70%);
  pointer-events: none;
}
.auth-wrap::after {
  content: ''; position: absolute;
  bottom: -120px; left: -120px;
  width: 380px; height: 380px; border-radius: 50%;
  background: radial-gradient(circle, rgba(11,122,117,.06), transparent 70%);
  pointer-events: none;
}

/* ── Auth card ── */
.auth-card {
  background: #ffffff;
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(11,122,117,.10), 0 2px 8px rgba(0,0,0,.06);
  border: 1px solid rgba(11,122,117,.1);
  padding: 44px 48px;
  width: 100%; max-width: 480px;
  position: relative; z-index: 1;
  animation: cardIn .4s ease both;
}
@keyframes cardIn { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

/* ── Auth logo ── */
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }

/* ── Auth title ── */
.auth-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.75rem; font-weight: 800;
  color: var(--ink); margin-bottom: 6px; letter-spacing: -.02em;
}
.auth-sub { font-size: .88rem; color: var(--ink-light); margin-bottom: 28px; line-height: 1.6; }

/* ── Tabs ── */
.auth-tabs {
  display: flex; gap: 6px; margin-bottom: 28px;
  background: var(--cream); border-radius: 12px; padding: 5px;
  border: 1px solid var(--border);
}
.auth-tab {
  flex: 1; padding: 10px 12px; border: none; background: none;
  border-radius: 9px; font-size: .88rem; font-weight: 500;
  color: var(--ink-light); cursor: pointer; transition: all .22s;
  font-family: 'DM Sans', sans-serif;
}
.auth-tab.active {
  background: white; color: var(--teal); font-weight: 700;
  box-shadow: 0 1px 6px rgba(0,0,0,.1);
}
.auth-tab:not(.active):hover { color: var(--ink); background: rgba(255,255,255,.6); }

/* ── Form controls ── */
.form-group { margin-bottom: 20px; }
.form-label {
  display: block; font-size: .8rem; font-weight: 600;
  color: var(--ink-mid); margin-bottom: 7px; letter-spacing: .01em;
}
.form-control {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: 11px;
  font-family: 'DM Sans', sans-serif; font-size: .9rem;
  color: var(--ink); background: var(--white); outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
  box-sizing: border-box;
}
.form-control::placeholder { color: #9CA3AF; }
.form-control:hover:not(:focus) { border-color: #C4C9D4; }
.form-control:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3.5px rgba(11,122,117,.1);
  background: #fafffe;
}
select.form-control { cursor: pointer; }

/* ── Form row ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── Submit button ── */
.form-btn {
  width: 100%; padding: 14px 20px; border-radius: 12px;
  background: linear-gradient(135deg, var(--teal), var(--teal-mid));
  color: white; border: none;
  font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 700;
  cursor: pointer; letter-spacing: .01em;
  box-shadow: 0 4px 16px rgba(11,122,117,.3);
  transition: all .25s; margin-top: 6px;
}
.form-btn:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--teal-dark), var(--teal));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(11,122,117,.38);
}
.form-btn:active:not(:disabled) { transform: translateY(0); }

/* ── Divider ── */
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 22px 0; color: var(--ink-light); font-size: .78rem; font-weight: 500;
}
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Demo buttons ── */
.btn-secondary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 11px 16px;
  border: 1.5px solid var(--border); border-radius: 11px;
  background: white; color: var(--ink-mid);
  font-family: 'DM Sans', sans-serif; font-size: .84rem; font-weight: 500;
  cursor: pointer; transition: all .22s;
}
.btn-secondary:hover {
  border-color: var(--teal); color: var(--teal);
  background: var(--teal-pale); transform: translateY(-1px);
}

/* ── Switch link ── */
.auth-switch { text-align: center; margin-top: 22px; font-size: .85rem; color: var(--ink-light); }
.auth-switch a { color: var(--teal); font-weight: 600; text-decoration: none; }
.auth-switch a:hover { text-decoration: underline; }

/* ── Forgot password ── */
.forgot-link {
  font-size: .82rem; color: var(--teal); font-weight: 600;
  text-decoration: none; transition: opacity .2s;
}
.forgot-link:hover { opacity: .75; text-decoration: underline; }

/* ── Responsive ── */
@media (max-width: 520px) {
  .auth-card { padding: 32px 24px; border-radius: 20px; }
  .auth-title { font-size: 1.5rem; }
}
</style>
</head>
<body id="page-login">

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">&#x1F3E5;</div>
      <span class="logo-text">E-Hospi<span>tee</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">&#x2190; Back to Home</a></li>
      <li><a href="ehospitee-register.html" class="nav-btn">Create Account</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark" style="width:44px;height:44px;font-size:1.3rem">&#x1F3E5;</div>
      <span class="logo-text" style="font-size:1.7rem">E-Hospi<span>tee</span></span>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your E-Hospitee account</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-patient" onclick="switchLoginTab('patient', this)">&#x1F464; Patient</button>
      <button class="auth-tab" id="tab-hospital" onclick="switchLoginTab('hospital', this)">&#x1F3E5; Hospital</button>
    </div>

    <!-- Patient Login -->
    <div id="login-patient">
      <div class="form-group">
        <label class="form-label" for="login-id">Mobile Number or Email</label>
        <input class="form-control" type="text" id="login-id" name="login-id"
          autocomplete="username" placeholder="+91 98765 43210 or email"
          oninput="clearFieldError(this)" onkeydown="if(event.key==='Enter') doDirectLogin('patient')"/>
        <div class="field-error" id="err-login-id"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-pw">Password</label>
        <div class="pw-wrap">
          <input class="form-control" type="password" id="login-pw" name="login-pw"
            autocomplete="current-password" placeholder="Enter your password"
            oninput="clearFieldError(this)" onkeydown="if(event.key==='Enter') doDirectLogin('patient')"/>
          <button type="button" class="pw-toggle" onclick="togglePw('login-pw', this)" aria-label="Show password">&#x1F441;</button>
        </div>
        <div class="field-error" id="err-login-pw"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
        <a href="#" style="font-size:.82rem;color:var(--teal);font-weight:600;text-decoration:none" onclick="showToast('Password reset coming soon');return false;">Forgot password?</a>
      </div>
      <button class="form-btn" id="btn-patient-login" onclick="doDirectLogin('patient')">
        <span class="btn-spinner"></span>Sign In as Patient
      </button>
    </div>

    <!-- Hospital Login -->
    <div id="login-hospital" style="display:none">
      <div class="form-group">
        <label class="form-label" for="hosp-login-id">Hospital Email</label>
        <input class="form-control" type="email" id="hosp-login-id" name="hosp-login-id"
          autocomplete="username" placeholder="admin@hospital.com"
          oninput="clearFieldError(this)" onkeydown="if(event.key==='Enter') doDirectLogin('hospital')"/>
        <div class="field-error" id="err-hosp-login-id"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="hosp-login-pw">Password</label>
        <div class="pw-wrap">
          <input class="form-control" type="password" id="hosp-login-pw" name="hosp-login-pw"
            autocomplete="current-password" placeholder="Enter your password"
            oninput="clearFieldError(this)" onkeydown="if(event.key==='Enter') doDirectLogin('hospital')"/>
          <button type="button" class="pw-toggle" onclick="togglePw('hosp-login-pw', this)" aria-label="Show password">&#x1F441;</button>
        </div>
        <div class="field-error" id="err-hosp-login-pw"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
        <a href="#" style="font-size:.82rem;color:var(--teal);font-weight:600;text-decoration:none" onclick="showToast('Password reset coming soon');return false;">Forgot password?</a>
      </div>
      <button class="form-btn" id="btn-hospital-login" onclick="doDirectLogin('hospital')">
        <span class="btn-spinner"></span>Sign In as Hospital
      </button>
    </div>

    <div class="auth-divider">or try a demo</div>
    <button class="btn-secondary" style="width:100%;justify-content:center;padding:12px" onclick="handleLogin('demo-patient')">
      &#x1F3AF; Patient Demo &mdash; rajesh@demo.com / demo123
    </button>
    <div style="height:10px"></div>
    <button class="btn-secondary" style="width:100%;justify-content:center;padding:12px" onclick="handleLogin('demo-hospital')">
      &#x1F3E5; Hospital Demo &mdash; admin@apollo.com / demo123
    </button>

    <div class="auth-switch">
      Don't have an account? <a href="ehospitee-register.html">Sign up here</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="ehospitee-js.js"></script>
<script>
// Password show/hide toggle
function togglePw(fieldId, btn) {
  const input = document.getElementById(fieldId);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
  else { input.type = 'password'; btn.innerHTML = '&#x1F441;'; }
}

// Clear field error on input
function clearFieldError(input) {
  input.classList.remove('error');
  const errEl = document.getElementById('err-' + input.id);
  if (errEl) { errEl.textContent = ''; errEl.classList.remove('show'); }
}

function showFieldError(fieldId, msg) {
  const input = document.getElementById(fieldId);
  const errEl = document.getElementById('err-' + fieldId);
  if (input) input.classList.add('error');
  if (errEl) { errEl.textContent = msg; errEl.classList.add('show'); }
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
}

// Wrapper with validation + loading state
async function doLogin(type) {
  const btnId = type === 'patient' ? 'btn-patient-login' : 'btn-hospital-login';
  let valid = true;

  if (type === 'patient') {
    const id = document.getElementById('login-id').value.trim();
    const pw = document.getElementById('login-pw').value.trim();
    if (!id) { showFieldError('login-id', 'Please enter your email or mobile'); valid = false; }
    if (!pw) { showFieldError('login-pw', 'Please enter your password'); valid = false; }
    if (!valid) return;
  } else {
    const id = document.getElementById('hosp-login-id').value.trim();
    const pw = document.getElementById('hosp-login-pw').value.trim();
    if (!id) { showFieldError('hosp-login-id', 'Please enter your email'); valid = false; }
    if (!pw) { showFieldError('hosp-login-pw', 'Please enter your password'); valid = false; }
    if (!valid) return;
  }

  setLoading(btnId, true);
  try {
    await handleLogin(type);
  } finally {
    setLoading(btnId, false);
  }
}

// Direct login — queries Supabase directly, shows real errors
async function doDirectLogin(type) {
  const btnId = type === 'patient' ? 'btn-patient-login' : 'btn-hospital-login';
  let id, pw;

  if (type === 'patient') {
    id = document.getElementById('login-id').value.trim();
    pw = document.getElementById('login-pw').value.trim();
    if (!id) { showFieldError('login-id', 'Please enter your email or mobile'); return; }
    if (!pw) { showFieldError('login-pw', 'Please enter your password'); return; }
  } else {
    id = document.getElementById('hosp-login-id').value.trim();
    pw = document.getElementById('hosp-login-pw').value.trim();
    if (!id) { showFieldError('hosp-login-id', 'Please enter your email'); return; }
    if (!pw) { showFieldError('hosp-login-pw', 'Please enter your password'); return; }
  }

  setLoading(btnId, true);
  try {
    const table = type === 'patient' ? 'patients' : 'hospitals';

    // Query by email
    let { data: user, error } = await _sb.from(table).select('*').eq('email', id.toLowerCase()).maybeSingle();

    // If patient, also try mobile
    if (!user && type === 'patient') {
      const res = await _sb.from(table).select('*').eq('mobile', id).maybeSingle();
      user = res.data; error = res.error;
    }

    if (error) { showToast('Login error: ' + error.message); return; }
    if (!user) { showToast('No account found with that email. Please register first.'); return; }

    // Verify password
    const ok = await verifyPw(pw, user.password);
    if (!ok) { showToast('Wrong password. Please try again.'); return; }

    // Save session
    const { password: _omit, ...safeUser } = user;
    const session = { user: { ...safeUser, role: type }, expiresAt: Date.now() + 8*60*60*1000 };
    localStorage.setItem('ehospitee_session', JSON.stringify(session));

    showToast('Welcome back, ' + (user.firstName || user.name || user.email) + '!');
    setTimeout(() => { window.location.href = 'ehospitee-patient.html'; }, 800);

  } catch(e) {
    showToast('Login error: ' + e.message);
    console.error(e);
  } finally {
    setLoading(btnId, false);
  }
}

// Password verify (handles both hashed and legacy plaintext)
async function verifyPw(password, stored) {
  if (!stored) return false;
  if (!stored.includes(':')) return stored === password; // legacy
  const [saltHex, storedHash] = stored.split(':');
  if (!saltHex || !storedHash) return false;
  const data = new TextEncoder().encode(saltHex + password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
  return hashHex === storedHash;
}
</script>
