<!-- â”€â”€ LOGIN FORM â”€â”€ -->
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark" style="width:44px;height:44px;font-size:1.3rem">ðŸ¥</div>
      <span class="logo-text" style="font-size:1.7rem">E-Hospi<span>tee</span></span>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your E-Hospitee account</p>

    <!-- Role Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchLoginTab('patient', this)">ðŸ‘¤ Patient</button>
      <button class="auth-tab" onclick="switchLoginTab('hospital', this)">ðŸ¥ Hospital</button>
    </div>

    <!-- Patient Login -->
    <div id="login-patient">
      <div class="form-group">
        <label class="form-label">Mobile Number or Email</label>
        <input class="form-control" type="text" id="login-id" placeholder="+91 98765 43210 or email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" id="login-pw" placeholder="Enter your password" onkeydown="if(event.key==='Enter') handleLogin('patient')"/>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-mid);cursor:pointer">
          <input type="checkbox" style="accent-color:var(--teal)"/> Remember me
        </label>
        <a style="font-size:.82rem;color:var(--teal);font-weight:600;cursor:pointer">Forgot password?</a>
      </div>
      <button class="form-btn" onclick="handleLogin('patient')">Sign In as Patient â†’</button>
    </div>

    <!-- Hospital Login -->
    <div id="login-hospital" style="display:none">
      <div class="form-group">
        <label class="form-label">Hospital Email</label>
        <input class="form-control" type="email" id="hosp-login-id" placeholder="admin@hospital.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" id="hosp-login-pw" placeholder="Enter your password" onkeydown="if(event.key==='Enter') handleLogin('hospital')"/>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-mid);cursor:pointer">
          <input type="checkbox" style="accent-color:var(--teal)"/> Remember me
        </label>
        <a style="font-size:.82rem;color:var(--teal);font-weight:600;cursor:pointer">Forgot password?</a>
      </div>
      <button class="form-btn" onclick="handleLogin('hospital')">Sign In as Hospital â†’</button>
    </div>

    <div class="auth-divider">or try a demo</div>
    <button class="btn-secondary" style="width:100%;justify-content:center;padding:12px" onclick="handleLogin('demo-patient')">
